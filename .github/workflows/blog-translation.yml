name: Blog Translation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run blog translation
        uses: anthropics/claude-code-action@v1
        with:
          claude_args: "--model haiku"
          prompt: |
            /blog-translation-strict
