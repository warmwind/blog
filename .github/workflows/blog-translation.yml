name: Blog Translation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Select articles
        uses: anthropics/claude-code-action@v1
        with:
          claude_args: "--model sonnet"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          settings: |
            {
              "permissions": {
                "allow": [
                  "WebSearch",
                  "WebFetch",
                  "Read",
                  "Write",
                  "Bash(*)",
                  "Glob",
                  "Grep"
                ]
              }
            }
          prompt: |
            You are running autonomously in CI — do not ask for user input.
            Your job is ONLY to select articles. Do NOT translate anything.

            1. Search the web for recent AI/tech blog posts from these sources, published within the last 3 days:
               - AI Labs: Anthropic Blog, OpenAI Blog, Google DeepMind Blog, Meta AI Blog, Mistral Blog, Cohere Blog
               - Developer Platforms: Hugging Face Blog, LangChain Blog, LlamaIndex Blog, Vercel AI Blog, Weights & Biases Blog
               - Cloud AI: AWS AI Blog, Google Cloud AI Blog, Azure AI Blog
               - Aggregators & Community: Hacker News (top AI/ML stories), The Gradient, Towards Data Science
               - Research & News: MIT Technology Review, The Batch (Andrew Ng), Simon Willison's Blog
            2. Select up to 3 of the best candidates that have NOT been translated yet (check src/data/blog/*.md for duplicates by originalUrl, title keywords, and slug).
               - Only pick in-depth technical articles (architecture deep dives, research papers, engineering case studies, detailed tutorials with code, system design posts).
               - Skip shallow announcement posts, product launches, marketing content, listicles, or brief news summaries.
               - Prefer longer articles (1500+ words) with substantial technical depth.
            3. Write the selection to /tmp/selected-articles.json as a JSON array:
               [{"title": "...", "url": "...", "publishDate": "..."}]
               If no suitable article is found, write an empty array [].

      - name: Check selection
        id: check
        run: |
          if [ ! -f /tmp/selected-articles.json ] || [ "$(cat /tmp/selected-articles.json)" = "[]" ]; then
            echo "No articles selected, skipping translation."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Articles selected:"
            cat /tmp/selected-articles.json
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Translate articles
        if: steps.check.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_args: "--model haiku"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          settings: |
            {
              "permissions": {
                "allow": [
                  "WebSearch",
                  "WebFetch",
                  "Read",
                  "Write",
                  "Edit",
                  "Bash(*)",
                  "Glob",
                  "Grep"
                ]
              }
            }
          prompt: |
            You are running autonomously in CI — do not ask for user input.
            Follow the /blog-translation-strict skill instructions for translation.

            Read the article list from /tmp/selected-articles.json.
            For each article in the list, sequentially:
            1. Fetch the full article content using `curl -sL <url>` via Bash (do NOT use WebFetch — it summarizes content and loses details). Parse the HTML to extract the article body.
            2. Translate EVERY SINGLE paragraph to Chinese. This is a FULL translation, NOT a summary.
               - You MUST translate every paragraph, every sentence. Do NOT condense or skip any content.
               - The translated article should be roughly the same length as the original.
               - Keep ALL images, ALL code blocks, ALL blockquotes, ALL headings from the original.
               - Keep the exact same structure (same number of headings, same number of paragraphs, same number of code blocks).
               - Set pubDatetime to the current translation time (now), NOT the original article's publish date.
               - Follow all other rules in the /blog-translation-strict skill.
            3. Write the translated post to src/data/blog/<slug>.md.

            After all translations are done:
            4. Run pnpm build once to verify all posts render correctly.
            5. Commit and push all translated posts to origin/main in a single commit.
