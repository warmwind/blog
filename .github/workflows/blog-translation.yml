name: Blog Translation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run blog translation
        uses: anthropics/claude-code-action@v1
        with:
          claude_args: "--model haiku"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          settings: |
            {
              "permissions": {
                "allow": [
                  "WebSearch",
                  "WebFetch",
                  "Read",
                  "Write",
                  "Edit",
                  "Bash(*)",
                  "Glob",
                  "Grep"
                ]
              }
            }
          prompt: |
            You are running autonomously in CI — do not ask for user input. Follow the /blog-translation-strict skill instructions fully:
            1. Search the web for recent AI/tech blog posts from these sources, published within the last 3 days:
               - AI Labs: Anthropic Blog, OpenAI Blog, Google DeepMind Blog, Meta AI Blog, Mistral Blog, Cohere Blog
               - Developer Platforms: Hugging Face Blog, LangChain Blog, LlamaIndex Blog, Vercel AI Blog, Weights & Biases Blog
               - Cloud AI: AWS AI Blog, Google Cloud AI Blog, Azure AI Blog
               - Aggregators & Community: Hacker News (top AI/ML stories), The Gradient, Towards Data Science
               - Research & News: MIT Technology Review, The Batch (Andrew Ng), Simon Willison's Blog
            2. Select up to 5 of the best candidates that have NOT been translated yet (check src/data/blog/*.md for duplicates).
               - Only pick in-depth technical articles (architecture deep dives, research papers, engineering case studies, detailed tutorials with code, system design posts).
               - Skip shallow announcement posts, product launches, marketing content, listicles, or brief news summaries.
               - Prefer longer articles (1500+ words) with substantial technical depth.
            3. For each selected article, translate it to Chinese following all the rules in the skill.
               - CRITICAL: Keep ALL images from the original article. Do not drop any image.
               - CRITICAL: Keep the exact same format as the original (headings, paragraphs, code blocks, tables, lists). Your job is ONLY translation — do not reorganize or reformat.
            4. After all translations are done, run pnpm build once to verify all posts.
            5. Commit and push all translated posts to origin/main in a single commit.
            If no suitable article is found within the 3-day window, expand to 7 days. If still nothing, exit gracefully with a message.
