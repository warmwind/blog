name: Blog Translation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run blog translation
        uses: anthropics/claude-code-action@v1
        with:
          claude_args: "--model haiku"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          additional_permissions: "WebSearch,WebFetch"
          prompt: |
            You are running autonomously in CI — do not ask for user input. Follow the /blog-translation-strict skill instructions fully:
            1. Search the web for recent AI/tech blog posts from these sources, published within the last 7 days:
               - AI Labs: Anthropic Blog, OpenAI Blog, Google DeepMind Blog, Meta AI Blog, Mistral Blog, Cohere Blog
               - Developer Platforms: Hugging Face Blog, LangChain Blog, LlamaIndex Blog, Vercel AI Blog, Weights & Biases Blog
               - Cloud AI: AWS AI Blog, Google Cloud AI Blog, Azure AI Blog
               - Aggregators & Community: Hacker News (top AI/ML stories), The Gradient, Towards Data Science
               - Research & News: MIT Technology Review, The Batch (Andrew Ng), Simon Willison's Blog
            2. Pick the best candidate that has NOT been translated yet (check src/data/blog/*.md for duplicates).
            3. Translate it to Chinese following all the rules in the skill.
            4. Run pnpm build to verify.
            5. Commit and push to origin/main.
            If no suitable article is found within the 7-day window, expand to 14 days. If still nothing, exit gracefully with a message.
